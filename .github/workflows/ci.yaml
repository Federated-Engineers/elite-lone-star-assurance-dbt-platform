name: CI pipeline

on:
  pull_request:
    paths:
      - "**.sql"
      - "lone_star_dbt/**"
      - "dbt_project.yml"
      - "packages.yml"
      - ".sqlfluff"

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run SQLFluff lint
        run: sqlfluff lint lone_star_dbt/models --dialect snowflake